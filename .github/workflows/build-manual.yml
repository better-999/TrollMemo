name: Build IPA (Manual)

on:
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Build scheme (rootless / roothide / default)'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - rootless
          - roothide

env:
  THEOS: ''
  XCODE_VERSION: '15.4'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build TrollMemo .tipa
    runs-on: macos-14

    steps:
      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install Homebrew dependencies
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 \
            brew install dpkg make libplist openssl@3 ldid-procursus zip
          echo "/usr/local/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Checkout XXTouchNG/theos
        uses: actions/checkout@v4
        with:
          repository: XXTouchNG/theos
          ref: 954dfd17fd05544a3bb26b2a25e1930cd228f4ef
          path: theos
          submodules: recursive

      - name: Set THEOS env & replace SDKs
        run: |
          rm -rf $GITHUB_WORKSPACE/theos/sdks
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: Checkout theos/sdks
        uses: actions/checkout@v4
        with:
          repository: theos/sdks
          ref: master
          path: ${{ env.THEOS }}/sdks

      - name: List available SDKs
        run: |
          echo "Available Xcode SDKs:"
          ls -la ~/Library/Developer/Xcode/Sdks/ 2>/dev/null || echo "No SDKs in ~/Library/Developer/Xcode/Sdks/"
          echo ""
          echo "Default iOS SDK:"
          xcrun --show-sdk-version --sdk iphoneos 2>/dev/null || echo "Cannot get SDK version"
          echo ""
          echo "Available iOS SDKs in theos:"
          ls $THEOS/sdks/ 2>/dev/null || echo "No SDKs in theos/sdks/"

      - name: Detect and set SDK version
        run: |
          # Try to detect available SDK from theos/sdks
          DETECTED_SDK=$(ls $THEOS/sdks/*.sdk 2>/dev/null | head -1 | xargs basename 2>/dev/null | sed 's/iPhoneOS//' | sed 's/.sdk//')
          if [ -n "$DETECTED_SDK" ]; then
            echo "Detected SDK: iPhoneOS${DETECTED_SDK}.sdk"
            echo "SDK_VERSION=${DETECTED_SDK}" >> $GITHUB_ENV
          else
            echo "Using default SDK: 17.4"
            echo "SDK_VERSION=17.4" >> $GITHUB_ENV
          fi

      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: project
          submodules: recursive
          fetch-depth: 0

      - name: Build package
        env:
          SDK_VERSION: ${{ env.SDK_VERSION }}
        run: |
          cd $GITHUB_WORKSPACE/project
          
          echo "=== Build Environment ==="
          echo "Current directory: $(pwd)"
          echo "THEOS path: $THEOS"
          echo "SDK_VERSION: $SDK_VERSION"
          echo "Files in directory:"
          ls -la
          echo "======================="
          
          # Get version tag (fallback to commit sha if no tag)
          GIT_TAG=$(git describe --tags --always --abbrev=0 2>/dev/null || git rev-parse --short HEAD)
          echo "GIT_TAG=$GIT_TAG" >> $GITHUB_ENV

          SCHEME="${{ github.event.inputs.scheme }}"
          echo "Building with scheme: $SCHEME"
          
          if [ "$SCHEME" = "roothide" ]; then
            THEOS_PACKAGE_SCHEME=roothide SDKVERSION=$SDK_VERSION TARGET="iphone:clang:$SDK_VERSION:14.0" FINALPACKAGE=1 make clean package 2>&1 | tee build.log
          elif [ "$SCHEME" = "rootless" ]; then
            THEOS_PACKAGE_SCHEME=rootless SDKVERSION=$SDK_VERSION TARGET="iphone:clang:$SDK_VERSION:14.0" FINALPACKAGE=1 make clean package 2>&1 | tee build.log
          else
            SDKVERSION=$SDK_VERSION TARGET="iphone:clang:$SDK_VERSION:14.0" FINALPACKAGE=1 make clean package 2>&1 | tee build.log
          fi
          
          echo "=== Build Log (last 100 lines) ==="
          tail -100 build.log
          echo "==================================="
          
          # Check for errors
          if grep -q "error:" build.log; then
            echo "=== Compilation Errors Found ==="
            grep -A2 "error:" build.log
            exit 1
          fi
          
          echo "=== Build Complete ==="
          echo "Packages directory:"
          ls -la packages/ || echo "WARNING: packages directory not found!"
          echo ""
          echo "=== Checking .tipa file ==="
          if [ -f "packages/"*.tipa ]; then
            TIPAFILE=$(ls packages/*.tipa 2>/dev/null | head -1)
            if [ -n "$TIPAFILE" ]; then
              SIZE=$(stat -f%z "$TIPAFILE" 2>/dev/null || stat -c%s "$TIPAFILE" 2>/dev/null)
              echo "Tipa file: $TIPAFILE"
              echo "File size: $SIZE bytes"
              if [ "$SIZE" -lt 10000 ]; then
                echo "WARNING: File size seems too small! Checking contents:"
                unzip -l "$TIPAFILE" || echo "Cannot list zip contents"
              fi
            fi
          else
            echo "ERROR: No .tipa file found!"
          fi
          echo "===================="

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TrollMemo${{ env.GIT_TAG }}_${{ github.event.inputs.scheme }}
          path: |
            project/packages/*.tipa
            project/build.log
          if-no-files-found: error